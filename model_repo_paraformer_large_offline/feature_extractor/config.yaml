ctc_conf:
  ctc_type: builtin
  dropout_rate: 0.0
  ignore_nan_grad: true
  reduce: true
dataset: AudioDataset
dataset_conf:
  batch_sampler: DynamicBatchLocalShuffleSampler
  batch_size: 1
  batch_type: example
  buffer_size: 500
  index_ds: IndexDSJsonl
  max_token_length: 2048
  num_workers: 0
  shuffle: true
decoder: ParaformerSANMDecoder
decoder_conf:
  att_layer_num: 16
  attention_heads: 4
  dropout_rate: 0.1
  kernel_size: 11
  linear_units: 2048
  num_blocks: 16
  positional_dropout_rate: 0.1
  sanm_shfit: 0
  self_attention_dropout_rate: 0.1
  src_attention_dropout_rate: 0.1
encoder: SANMEncoder
encoder_conf:
  attention_dropout_rate: 0.1
  attention_heads: 4
  dropout_rate: 0.1
  input_layer: pe
  kernel_size: 11
  linear_units: 2048
  normalize_before: true
  num_blocks: 50
  output_size: 512
  pos_enc_class: SinusoidalPositionEncoder
  positional_dropout_rate: 0.1
  sanm_shfit: 0
  selfattention_layer_type: sanm
frontend: WavFrontend
frontend_conf:
  frame_length: 25
  frame_shift: 10
  fs: 16000
  lfr_m: 7
  lfr_n: 6
  n_mels: 80
  window: hamming
input_size: 560
model: Paraformer
model_conf:
  ctc_weight: 0.0
  length_normalized_loss: true
  lsm_weight: 0.1
  predictor_bias: 1
  predictor_weight: 1.0
  sampling_ratio: 0.75
normalize: null
optim: adam
optim_conf:
  lr: 0.0005
predictor: CifPredictorV2
predictor_conf:
  idim: 512
  l_order: 1
  r_order: 1
  tail_threshold: 0.45
  threshold: 1.0
scheduler: warmuplr
scheduler_conf:
  warmup_steps: 30000
specaug: SpecAugLFR
specaug_conf:
  apply_freq_mask: true
  apply_time_mask: true
  apply_time_warp: false
  freq_mask_width_range:
  - 0
  - 30
  lfr_rate: 6
  num_freq_mask: 1
  num_time_mask: 1
  time_mask_width_range:
  - 0
  - 12
  time_warp_mode: bicubic
  time_warp_window: 5
